<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Left ear -->
  <ellipse cx="68" cy="50" rx="18" ry="44" fill="#7c5cbf" stroke="#1a1a2e" stroke-width="3"/>
  <ellipse cx="68" cy="52" rx="10" ry="32" fill="#e8d5f0"/>
  <!-- Right ear -->
  <ellipse cx="132" cy="50" rx="18" ry="44" fill="#7c5cbf" stroke="#1a1a2e" stroke-width="3"/>
  <ellipse cx="132" cy="52" rx="10" ry="32" fill="#e8d5f0"/>

  <!-- Body (egg shape) -->
  <ellipse cx="100" cy="158" rx="72" ry="78" fill="#7c5cbf" stroke="#1a1a2e" stroke-width="3.5"/>

  <!-- Face area (lighter oval) -->
  <ellipse cx="100" cy="125" rx="40" ry="42" fill="#e8d5f0"/>

  <!-- Lab coat body -->
  <path d="M 42 175 Q 38 230 100 235 Q 162 230 158 175 L 148 148 Q 130 170 100 172 Q 70 170 52 148 Z" fill="#f0f0f0" stroke="#b0b0b0" stroke-width="2"/>
  <!-- Lab coat left lapel -->
  <path d="M 70 148 L 58 170 L 78 182 L 85 158 Z" fill="#f8f8f8" stroke="#b0b0b0" stroke-width="1.5"/>
  <!-- Lab coat right lapel -->
  <path d="M 130 148 L 142 170 L 122 182 L 115 158 Z" fill="#f8f8f8" stroke="#b0b0b0" stroke-width="1.5"/>
  <!-- Lab coat center line -->
  <line x1="100" y1="172" x2="100" y2="235" stroke="#b0b0b0" stroke-width="1.5"/>
  <!-- Lab coat pocket -->
  <rect x="118" y="188" width="22" height="16" rx="3" fill="none" stroke="#b0b0b0" stroke-width="1.5"/>
  <!-- Pocket line -->
  <line x1="118" y1="194" x2="140" y2="194" stroke="#b0b0b0" stroke-width="1"/>
  <!-- Buttons -->
  <circle cx="100" cy="195" r="4" fill="none" stroke="#9090a0" stroke-width="1.5"/>
  <circle cx="100" cy="212" r="4" fill="none" stroke="#9090a0" stroke-width="1.5"/>
  <!-- Button dashes -->
  <line x1="103" y1="195" x2="109" y2="196" stroke="#9090a0" stroke-width="1"/>
  <line x1="103" y1="212" x2="109" y2="213" stroke="#9090a0" stroke-width="1"/>

  <!-- Eyes -->
  <circle cx="83" cy="115" r="9" fill="#1a1a2e"/>
  <circle cx="117" cy="115" r="9" fill="#1a1a2e"/>
  <circle cx="86" cy="112" r="3" fill="#fff"/>
  <circle cx="120" cy="112" r="3" fill="#fff"/>

  <!-- Nose -->
  <ellipse cx="100" cy="130" rx="7" ry="5" fill="#e88fa0"/>

  <!-- Mouth (smile) -->
  <path d="M 92 138 Q 100 146 108 138" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Outline on top of everything -->
  <ellipse cx="100" cy="158" rx="72" ry="78" fill="none" stroke="#1a1a2e" stroke-width="3.5"/>
</svg>
